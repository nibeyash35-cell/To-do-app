<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="app">
    <section class="topbar">
      <div>
        <p class="eyebrow">Daily planner</p>
        <h1>To-Do Flow</h1>
        <p class="subtitle">A clean, modern, and aesthetic task manager.</p>
      </div>
      <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
    </section>

    <section class="hero-card">
      <div class="hero-left">
        <h2>Get things done in style</h2>
        <p>Plan your day, track your progress, and enjoy a smoother workflow.</p>
      </div>
      <div class="hero-right">
        <div class="ring">
          <span id="progressText">0%</span>
        </div>
      </div>
    </section>

    <section class="glass-card">
      <form id="todoForm" class="input-row">
        <input
          type="text"
          id="todoInput"
          placeholder="What do you need to do today?"
          autocomplete="off"
        />
        <button type="submit" class="add-btn">Add Task</button>
      </form>

      <div class="toolbar">
        <div class="filters">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="active">Active</button>
          <button class="chip" data-filter="completed">Completed</button>
        </div>
        <button id="clearCompleted" class="ghost-btn">Clear Completed</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span id="totalCount">0</span>
          <p>Total</p>
        </div>
        <div class="stat">
          <span id="activeCount">0</span>
          <p>Active</p>
        </div>
        <div class="stat">
          <span id="completedCount">0</span>
          <p>Done</p>
        </div>
      </div>

      <ul id="todoList" class="todo-list" aria-live="polite"></ul>
    </section>
  </main>

  <template id="todoTemplate">
    <li class="todo-item">
      <label class="todo-main">
        <input type="checkbox" class="complete-toggle" />
        <span class="check"></span>
        <span class="todo-text"></span>
      </label>
      <div class="todo-actions">
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </div>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
